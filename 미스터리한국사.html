<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미스터리 한국사: 시간의 협곡 (Final)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap');

        body {
            font-family: 'Jua', sans-serif;
            background-color: #020617; /* Slate-950 */
            color: white;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        .game-frame {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            background: #1e293b;
            border: 4px solid #0f172a;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .screen-container {
            flex: 1;
            background: #334155;
            margin: 10px;
            border: 6px solid #fbbf24;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            flex: 1; width: 100%; height: 100%;
            display: none; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative;
        }
        .screen.active { display: flex; }

        /* 게임 1 컨트롤러 */
        .drop-game-area { flex: 1; width: 100%; position: relative; background: #111; }
        .drop-control-area {
            height: 100px; width: 100%; background: #1e293b;
            display: flex; justify-content: center; align-items: center;
            gap: 20px; border-top: 4px solid #0f172a; z-index: 50;
        }

        /* 버튼 */
        .btn-game {
            background: #f59e0b; border: 3px solid #fff;
            color: #3f1d0b; padding: 12px; font-size: 1.3rem;
            cursor: pointer; box-shadow: 0 5px 0 #b45309;
            transition: all 0.1s; border-radius: 12px;
            font-family: 'Black Han Sans', sans-serif;
        }
        .btn-game:active { transform: translateY(4px); box-shadow: none; }
        .btn-game.blue { background: #3b82f6; color: #1e3a8a; box-shadow: 0 5px 0 #1d4ed8; }
        .btn-game.red { background: #ef4444; color: #7f1d1d; box-shadow: 0 5px 0 #b91c1c; }
        .btn-game.purple { background: #a855f7; color: #581c87; box-shadow: 0 5px 0 #7e22ce; }

        /* 모달 팝업 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 200; padding: 20px;
        }
        .modal-box {
            background: #fff; color: #333; padding: 25px;
            border-radius: 20px; border: 5px solid #333;
            width: 90%; text-align: center; font-family: 'Nanum Gothic', sans-serif;
            animation: popIn 0.3s;
        }
        @keyframes popIn { from { transform: scale(0.5); } to { transform: scale(1); } }

        /* RPG 레이저 */
        .laser-beam {
            position: absolute; top: 50%; left: 18%; right: 18%; height: 6px;
            background: linear-gradient(90deg, #3b82f6 50%, #ef4444 50%);
            box-shadow: 0 0 15px #fff; z-index: 1;
            transform: translateY(-50%); transition: background 0.3s;
        }

        /* 어사출두요 단어 */
        .word-token {
            display: inline-block; padding: 6px 10px; margin: 4px;
            background: #fff; border: 2px solid #cbd5e1; border-radius: 8px;
            cursor: pointer; font-size: 1.3rem; color: #1e293b;
            font-family: 'Nanum Gothic'; font-weight: bold;
        }
        .word-token:hover { background: #fef3c7; border-color: #f59e0b; transform: scale(1.05); }

    </style>
</head>
<body>

<div class="game-frame">
    
    <div class="bg-slate-900 p-3 flex justify-between items-center text-sm border-b-2 border-slate-700 text-white">
        <span id="top-user" class="font-bold text-yellow-300">👤 도전자</span>
        <span class="font-bold">🏆 <span id="top-score">0</span>점</span>
        <button onclick="goHome()" class="bg-red-600 px-3 py-1 rounded-full text-white text-xs font-bold hover:bg-red-500">나가기</button>
    </div>

    <div class="screen-container">
        
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-box" id="modal-box">
                <h2 id="modal-title" class="text-3xl font-bold mb-3">알림</h2>
                <div id="modal-content" class="text-xl mb-6 font-bold text-gray-700 leading-relaxed">내용</div>
                <button class="btn-game blue w-full" onclick="closeModal()">확인</button>
            </div>
        </div>

        <div id="screen-login" class="screen active" style="background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);">
            <div class="flex flex-col items-center justify-center w-full h-full p-6">
                <h1 class="text-5xl mb-2 text-yellow-400 font-bold drop-shadow-[0_5px_5px_rgba(0,0,0,0.5)] text-center leading-tight" style="font-family: 'Black Han Sans'">미스터리 한국사<br><span class="text-3xl text-white">시간의 협곡</span></h1>
                <div class="mt-8 bg-black/40 p-8 rounded-3xl w-full max-w-sm border-2 border-indigo-400 backdrop-blur-sm flex flex-col items-center">
                    <input type="text" id="nickname-input" class="w-full p-4 text-center text-2xl font-bold rounded-xl mb-6 text-slate-900 outline-none focus:ring-4 ring-yellow-400" placeholder="닉네임 입력">
                    <button class="btn-game w-full" onclick="startGameFlow()">모험 시작 ▶</button>
                </div>
            </div>
        </div>

        <div id="screen-menu" class="screen" style="background: #1e293b;">
            <h2 class="text-2xl mb-4 text-white font-bold mt-4">미션을 선택하세요!</h2>
            <div class="grid grid-cols-1 gap-3 w-full max-w-sm px-6 mb-4">
                <button class="btn-game blue" onclick="initDropGame()">1. 유물 분류 (블록)</button>
                <button class="btn-game red" onclick="initRPGGame()">2. 요괴 배틀 (퀴즈)</button>
                <button class="btn-game" style="background:#22c55e; color:#064e3b; box-shadow:0 5px 0 #14532d;" onclick="initCardGame()">3. 유물 발굴 (카드)</button>
                <button class="btn-game purple" onclick="initDetectiveGame()">4. 어사 출두 (추리)</button>
            </div>
            
            <div class="bg-slate-800 w-[90%] flex-1 rounded-xl p-4 overflow-y-auto border border-slate-600 mb-4 shadow-inner">
                <h3 class="text-center text-yellow-400 border-b border-slate-600 pb-2 mb-2 font-bold">🏅 명예의 전당 (시간순)</h3>
                <div id="ranking-list" class="text-sm space-y-2"></div>
            </div>
        </div>

        <div id="screen-game1" class="screen p-0" style="display: none; flex-direction: column;">
            <div class="drop-game-area">
                <canvas id="canvas-drop" style="width:100%; height:100%; display:block;"></canvas>
                <div class="absolute top-2 left-2 bg-black/60 px-3 py-1 rounded text-yellow-300 font-bold z-10 border border-white/20">
                    목표: 2000점
                </div>
            </div>
            <div class="drop-control-area">
                <button class="btn-game blue w-32 h-20 text-3xl" onclick="moveDrop(-1)">◀</button>
                <button class="btn-game blue w-32 h-20 text-3xl" onclick="moveDrop(1)">▶</button>
            </div>
        </div>

        <div id="screen-game2" class="screen bg-slate-900">
            <div class="relative w-full h-[45%] flex items-center justify-between px-8 mt-2">
                <div class="laser-beam" id="battle-laser"></div>
                <div class="flex flex-col items-center z-10 w-24">
                    <div class="w-full h-4 bg-gray-700 rounded-full border border-white mb-1 overflow-hidden">
                        <div id="hero-hp" class="h-full bg-blue-500 w-1/2 transition-all duration-300"></div>
                    </div>
                    <div class="text-6xl animate-bounce filter drop-shadow-lg">🛡️</div>
                    <div class="font-bold text-blue-200">나</div>
                </div>
                <div class="flex flex-col items-center z-10 w-24">
                    <div class="w-full h-4 bg-gray-700 rounded-full border border-white mb-1 overflow-hidden">
                        <div id="monster-hp" class="h-full bg-red-500 w-1/2 transition-all duration-300"></div>
                    </div>
                    <div class="text-7xl transition-all duration-500 filter drop-shadow-lg" id="monster-sprite">👹</div>
                    <div class="font-bold text-red-400">요괴</div>
                </div>
            </div>
            <div class="bg-white p-5 w-full flex-1 flex flex-col rounded-t-[2rem] z-20 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                <div id="rpg-question" class="text-xl font-bold text-slate-900 mb-3 bg-slate-100 p-4 rounded-2xl text-center border-2 border-slate-200 flex items-center justify-center min-h-[5rem]">문제 로딩중...</div>
                <div id="rpg-options" class="flex flex-col gap-3 overflow-y-auto flex-1"></div>
            </div>
        </div>

        <div id="screen-game3" class="screen bg-[#14532d]">
            <div class="text-center mb-4 text-green-200 font-bold text-xl bg-black/20 p-2 rounded-full px-6">모든 짝을 찾으세요!</div>
            <div class="grid grid-cols-4 gap-3 w-full max-w-md aspect-square px-4" id="card-board"></div>
        </div>

        <div id="screen-game4" class="screen bg-[#4c1d95]">
            <div class="w-full px-6 mb-2">
                <div class="flex justify-between text-yellow-200 text-sm mb-1 font-bold">
                    <span>⏳ 남은 시간</span>
                    <span id="det-time-txt">10.0</span>
                </div>
                <div class="w-full h-3 bg-purple-900 rounded-full overflow-hidden border border-purple-400">
                    <div id="det-timer-fill" class="h-full bg-yellow-400 w-full transition-all duration-100"></div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-2xl w-[90%] shadow-2xl relative mt-4 border-4 border-purple-300">
                <div class="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-purple-600 text-white px-4 py-1 rounded-full font-bold text-sm border-2 border-white shadow-lg">거짓말은 딱 1개!</div>
                <div id="det-sentence" class="text-2xl leading-loose text-slate-900 font-bold text-left break-keep"></div>
            </div>
            <div class="mt-8 text-center text-purple-200 animate-pulse text-lg font-bold">▼ 거짓말 단어를 찾아 터치하세요!</div>
        </div>

    </div>
</div>

<script>
    /* ------------------------------
       시스템 & 공통 변수
       ------------------------------ */
    const GAME_KEY = "history_final_v5_rank";
    let currentUser = "플레이어";
    let score = 0;
    let gameStartTime = 0; 
    let isPaused = false;
    let modalCallback = null;
    const GOAL_SCORE = 2000;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.style.display = 'none';
        });
        const target = document.getElementById(id);
        target.classList.add('active');
        target.style.display = (id === 'screen-game1') ? 'flex' : 'flex';
        document.getElementById('top-score').innerText = score;
    }

    function showModal(title, text, callback = null, isCorrect = false) {
        isPaused = true;
        const box = document.getElementById('modal-box');
        const titleEl = document.getElementById('modal-title');
        box.style.borderColor = isCorrect ? "#22c55e" : "#ef4444";
        titleEl.style.color = isCorrect ? "#15803d" : "#b91c1c";
        titleEl.innerHTML = (isCorrect ? "⭕ " : "❌ ") + title;
        document.getElementById('modal-content').innerHTML = text;
        document.getElementById('modal-overlay').style.display = 'flex';
        modalCallback = callback;
    }

    function closeModal() {
        document.getElementById('modal-overlay').style.display = 'none';
        isPaused = false;
        if (modalCallback) modalCallback();
    }

    function startGameFlow() {
        const nick = document.getElementById('nickname-input').value.trim();
        if(nick) currentUser = nick;
        document.getElementById('top-user').innerText = `👤 ${currentUser}`;
        loadRanking();
        showScreen('screen-menu');
    }

    function goHome() {
        isPaused = true;
        clearInterval(detTimerInterval);
        showScreen('screen-menu');
    }

    function clearGame(gameName) {
        isPaused = true;
        const endTime = Date.now();
        const duration = ((endTime - gameStartTime) / 1000).toFixed(1);
        
        saveRanking(currentUser, score, gameName, parseFloat(duration));
        
        showModal("🎉 미션 클리어!", 
            `<div class="text-2xl text-blue-600 mb-2">${gameName} 정복!</div>
             <div class="text-lg">걸린 시간: <span class="font-bold text-red-500">${duration}초</span></div>
             <div class="text-sm text-gray-400 mt-2">명예의 전당 등록 완료</div>`, 
            () => {
                showScreen('screen-menu');
                loadRanking();
            }, true);
    }

    function saveRanking(name, score, game, time) {
        const data = JSON.parse(localStorage.getItem(GAME_KEY)) || [];
        data.push({ name, score, game, time, date: new Date().toLocaleDateString() });
        
        data.sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            return a.time - b.time; // 시간 빠른순
        });
        
        localStorage.setItem(GAME_KEY, JSON.stringify(data.slice(0, 10)));
    }

    function loadRanking() {
        const data = JSON.parse(localStorage.getItem(GAME_KEY)) || [];
        const list = document.getElementById('ranking-list');
        if(data.length === 0) {
            list.innerHTML = "<div class='text-center text-gray-400 py-4'>아직 기록이 없습니다.</div>";
            return;
        }
        list.innerHTML = data.map((d, i) => `
            <div class="flex justify-between border-b border-slate-600 pb-2 mb-1 text-white items-center">
                <div class="flex items-center gap-2">
                    <span class="text-yellow-400 font-bold text-lg w-6">${i+1}</span>
                    <div class="flex flex-col text-left">
                        <span class="font-bold text-sm">${d.name}</span>
                        <span class="text-xs text-gray-400">${d.game}</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="font-bold text-green-400">${d.score}점</div>
                    <div class="text-xs text-yellow-200">${d.time}초</div>
                </div>
            </div>
        `).join('');
    }

    /* ------------------------------
       [게임 1] 역사 쌓기
       ------------------------------ */
    const canvas = document.getElementById('canvas-drop');
    const ctx = canvas.getContext('2d');
    let dropData = { item: null, lanes: ["고조선", "삼국", "조선"] };
    
    const dropItemsDB = [
        {t:"비파형동검", a:0}, {t:"탁자식고인돌", a:0}, {t:"8조법", a:0}, {t:"단군왕검", a:0}, {t:"미송리식토기", a:0},
        {t:"광개토대왕릉비", a:1}, {t:"무령왕릉", a:1}, {t:"첨성대", a:1}, {t:"석굴암", a:1}, {t:"불국사", a:1}, {t:"다보탑", a:1}, {t:"금동대향로", a:1},
        {t:"훈민정음", a:2}, {t:"거북선", a:2}, {t:"경국대전", a:2}, {t:"측우기", a:2}, {t:"앙부일구", a:2}, {t:"수원화성", a:2}, {t:"대동여지도", a:2}
    ];

    function initDropGame() {
        score = 0; document.getElementById('top-score').innerText = score;
        gameStartTime = Date.now();
        showScreen('screen-game1');
        
        const parent = document.querySelector('.drop-game-area');
        canvas.width = parent.clientWidth;
        canvas.height = parent.clientHeight;
        
        spawnDrop();
        isPaused = false;
        dropLoop();
    }

    function spawnDrop() {
        const rand = dropItemsDB[Math.floor(Math.random() * dropItemsDB.length)];
        dropData.item = { ...rand, x: 0, y: 30, lane: 1 };
    }

    function moveDrop(dir) {
        if(isPaused || !dropData.item) return;
        dropData.item.lane += dir;
        if(dropData.item.lane < 0) dropData.item.lane = 0;
        if(dropData.item.lane > 2) dropData.item.lane = 2;
    }

    function dropLoop() {
        if(!document.getElementById('screen-game1').classList.contains('active')) return;
        requestAnimationFrame(dropLoop);
        if(isPaused) return;

        ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const laneW = canvas.width / 3;
        const basketY = canvas.height - 80;

        ctx.strokeStyle = "#444"; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(laneW, 0); ctx.lineTo(laneW, basketY);
        ctx.moveTo(laneW*2, 0); ctx.lineTo(laneW*2, basketY);
        ctx.stroke();

        ctx.font = "bold 20px 'Jua'"; ctx.textAlign = "center";
        dropData.lanes.forEach((txt, i) => {
            ctx.fillStyle = i===0?"#8d6e63":i===1?"#5c6bc0":"#26a69a";
            ctx.fillRect(i*laneW + 5, basketY, laneW - 10, 60);
            ctx.fillStyle = "#fff";
            ctx.fillText(txt, i*laneW + laneW/2, basketY + 38);
        });

        const item = dropData.item;
        if(item) {
            item.y += 6; 
            item.x = item.lane * laneW + laneW/2;
            ctx.fillStyle = "#fbbf24";
            ctx.font = "28px 'Black Han Sans'";
            ctx.fillText(item.t, item.x, item.y);

            if(item.y > basketY) {
                if(item.lane === item.a) {
                    score += 100;
                    document.getElementById('top-score').innerText = score;
                    if(score >= GOAL_SCORE) clearGame("역사 분류");
                    else spawnDrop();
                } else {
                    showModal("실수!", `'${item.t}' → ${dropData.lanes[item.a]}`, () => spawnDrop(), false);
                }
            }
        }
    }

    /* ------------------------------
       [게임 2] RPG (보기 셔플 적용)
       ------------------------------ */
    // 데이터 구조: q=문제, o=보기목록(0번이 항상 정답, 나중에 섞음), a=정답인덱스(항상 0으로 시작하지만 섞인 후 바뀜)
    // 팁: o 배열의 0번째가 정답입니다. 로직에서 이걸 섞어서 보여줍니다.
    const rpgDB = [
        {q:"발해를 건국한 사람은?", o:["대조영","왕건","이성계"]},
        {q:"'해동성국'이라 불린 나라는?", o:["발해","신라","고려"]},
        {q:"고조선 8조법: 도둑질한 자는?", o:["노비로 삼는다","사형","추방"]},
        {q:"백제의 전성기(4세기) 왕은?", o:["근초고왕","장수왕","진흥왕"]},
        {q:"고구려의 전성기(5세기) 왕은?", o:["장수왕","법흥왕","무왕"]},
        {q:"신라의 전성기(6세기) 왕은?", o:["진흥왕","근초고왕","광개토대왕"]},
        {q:"신라 삼국통일의 한계는?", o:["외세 의존","영토 넓어짐","고구려 멸망"]},
        {q:"후고구려를 세운 왕?", o:["궁예","견훤","왕건"]},
        {q:"고려가 몽골 침입 때 간 섬?", o:["강화도","제주도","울릉도"]},
        {q:"조선의 첫 도읍지는?", o:["한양","개경","공주"]},
        {q:"세종대왕이 만든 글자는?", o:["훈민정음","이두","한자"]},
        {q:"임진왜란이 일어난 해는?", o:["1592년","1950년","1392년"]},
        {q:"대동여지도를 만든 사람?", o:["김정호","장영실","정약용"]},
        {q:"수원 화성을 건설한 왕?", o:["정조","영조","세종"]}
    ];
    let heroHP = 50, monsterHP = 50;

    function initRPGGame() {
        score = 0; document.getElementById('top-score').innerText = score;
        gameStartTime = Date.now();
        showScreen('screen-game2');
        heroHP = 50; monsterHP = 50; updateHP();
        document.getElementById('monster-sprite').style.opacity = 1;
        document.getElementById('monster-sprite').innerText = "👹";
        isPaused = false;
        nextRPG();
    }

    function updateHP() {
        document.getElementById('hero-hp').style.width = heroHP + "%";
        document.getElementById('monster-hp').style.width = monsterHP + "%";
        const laser = document.getElementById('battle-laser');
        if(heroHP > monsterHP) laser.style.background = "linear-gradient(90deg, #3b82f6 80%, #ef4444 20%)";
        else if(heroHP < monsterHP) laser.style.background = "linear-gradient(90deg, #3b82f6 20%, #ef4444 80%)";
        else laser.style.background = "linear-gradient(90deg, #3b82f6 50%, #ef4444 50%)";
    }

    function nextRPG() {
        const q = rpgDB[Math.floor(Math.random() * rpgDB.length)];
        document.getElementById('rpg-question').innerText = q.q;
        const opts = document.getElementById('rpg-options');
        opts.innerHTML = "";

        // ★★★ 정답 셔플 로직 적용 ★★★
        const correctText = q.o[0]; // 0번이 항상 정답
        const shuffledOptions = [...q.o].sort(() => Math.random() - 0.5);

        shuffledOptions.forEach(txt => {
            const btn = document.createElement('button');
            btn.className = "bg-white border-b-2 border-slate-300 text-slate-900 py-3 rounded-xl font-bold text-lg hover:bg-blue-100";
            btn.innerText = txt;
            btn.onclick = () => {
                if(txt === correctText) {
                    // 정답
                    heroHP = Math.min(100, heroHP + 15);
                    monsterHP = Math.max(0, monsterHP - 15);
                    score += 100;
                    document.getElementById('top-score').innerText = score;
                    updateHP();

                    if(score >= GOAL_SCORE) {
                        document.getElementById('monster-sprite').innerText = "💥";
                        setTimeout(() => clearGame("요괴 배틀"), 500);
                    } else nextRPG();
                } else {
                    // 오답
                    heroHP = Math.max(0, heroHP - 15);
                    monsterHP = Math.min(100, monsterHP + 15);
                    updateHP();
                    showModal("오답!", `정답: ${correctText}<br>내 파워가 줄어듭니다.`, () => nextRPG(), false);
                }
            };
            opts.appendChild(btn);
        });
    }

    /* ------------------------------
       [게임 3] 카드
       ------------------------------ */
    const cardPool = [
        {t:"대조영", p:1}, {t:"발해", p:1},
        {t:"왕건", p:2}, {t:"고려", p:2},
        {t:"이성계", p:3}, {t:"조선", p:3},
        {t:"석굴암", p:4}, {t:"통일신라", p:4},
        {t:"흥인지문", p:5}, {t:"동대문", p:5},
        {t:"숭례문", p:6}, {t:"남대문", p:6},
        {t:"위화도", p:7}, {t:"회군", p:7},
        {t:"앙부일구", p:8}, {t:"해시계", p:8},
        {t:"훈민정음", p:9}, {t:"세종대왕", p:9},
        {t:"거북선", p:10}, {t:"이순신", p:10},
        {t:"대동여지도", p:11}, {t:"김정호", p:11},
        {t:"목민심서", p:12}, {t:"정약용", p:12},
        {t:"첨성대", p:13}, {t:"선덕여왕", p:13},
        {t:"화랑도", p:14}, {t:"신라", p:14}
    ];
    let flipped = [];

    function initCardGame() {
        score = 0; document.getElementById('top-score').innerText = score;
        gameStartTime = Date.now();
        showScreen('screen-game3');
        const board = document.getElementById('card-board');
        board.innerHTML = "";
        
        // 8쌍 랜덤 선택
        const uniquePairs = [...new Set(cardPool.map(c => c.p))];
        const selectedPairs = uniquePairs.sort(() => 0.5 - Math.random()).slice(0, 8);
        let deck = cardPool.filter(c => selectedPairs.includes(c.p));
        deck.sort(() => Math.random() - 0.5);

        deck.forEach(item => {
            const el = document.createElement('div');
            el.className = "bg-[#15803d] border-2 border-green-400 rounded-xl flex items-center justify-center text-transparent cursor-pointer font-bold select-none text-base transition-all shadow-lg hover:scale-105";
            el.innerText = item.t;
            el.dataset.p = item.p;
            el.onclick = () => {
                if(el.classList.contains('flipped') || flipped.length >= 2) return;
                
                el.classList.remove('bg-[#15803d]', 'text-transparent');
                el.classList.add('bg-white', 'text-black', 'flipped');
                flipped.push(el);

                if(flipped.length === 2) {
                    if(flipped[0].dataset.p === flipped[1].dataset.p) {
                        flipped = [];
                        if(document.querySelectorAll('.flipped').length === 16) {
                             score = 2000;
                             document.getElementById('top-score').innerText = score;
                             setTimeout(() => clearGame("유물 발굴"), 500);
                        }
                    } else {
                        setTimeout(() => {
                            flipped.forEach(c => {
                                c.classList.add('bg-[#15803d]', 'text-transparent');
                                c.classList.remove('bg-white', 'text-black', 'flipped');
                            });
                            flipped = [];
                        }, 800);
                    }
                }
            };
            board.appendChild(el);
        });
    }

    /* ------------------------------
       [게임 4] 어사 출두요 (문제 수정 완료)
       ------------------------------ */
    const detDB = [
        { t: "이성계는 위화도에서 탱크를 돌려 조선을 세웠다.", w: "탱크를", a: "군대를" },
        { t: "김유신 장군은 스마트폰으로 작전을 지시했다.", w: "스마트폰으로", a: "연/봉화로" },
        { t: "고조선 사람들은 편의점에서 고기를 구해 먹었다.", w: "편의점에서", a: "시장에서/직접" }, // 수정됨
        { t: "세종대왕은 컴퓨터로 훈민정음을 만들었다.", w: "컴퓨터로", a: "붓으로" },
        { t: "거북선은 엔진을 켜고 바다를 달렸다.", w: "엔진을", a: "노를" },
        { t: "고려청자는 플라스틱으로 만들어졌다.", w: "플라스틱으로", a: "흙으로" },
        { t: "석굴암은 시멘트로 만든 인공 석굴이다.", w: "시멘트로", a: "돌로" },
        { t: "삼국시대 사람들은 아파트에 살았다.", w: "아파트에", a: "초가집에" },
        { t: "대조영은 비행기를 타고 이동했다.", w: "비행기를", a: "말을" },
        { t: "신라 화랑들은 인터넷으로 친구를 사귀었다.", w: "인터넷으로", a: "직접 만나" },
        { t: "왕건은 자동차를 타고 후삼국을 통일했다.", w: "자동차를", a: "말을" },
        { t: "정약용은 포크레인을 이용해 성을 쌓았다.", w: "포크레인을", a: "거중기를" }
    ];

    let detTimerInterval;
    let detTimeLeft = 10;

    function initDetectiveGame() {
        score = 0; document.getElementById('top-score').innerText = score;
        gameStartTime = Date.now();
        showScreen('screen-game4');
        isPaused = false;
        loadDet();
    }

    function startDetTimer() {
        clearInterval(detTimerInterval);
        detTimeLeft = 10;
        updateTimerBar();
        detTimerInterval = setInterval(() => {
            if(isPaused) return;
            detTimeLeft -= 0.1;
            updateTimerBar();
            if(detTimeLeft <= 0) {
                clearInterval(detTimerInterval);
                showModal("시간 초과!", "범인을 놓쳤습니다!", () => loadDet(), false);
            }
        }, 100);
    }

    function updateTimerBar() {
        document.getElementById('det-time-txt').innerText = Math.max(0, detTimeLeft).toFixed(1);
        document.getElementById('det-timer-fill').style.width = (detTimeLeft * 10) + "%";
    }

    function loadDet() {
        if(score >= 2000) {
            clearGame("어사 출두");
            return;
        }
        const q = detDB[Math.floor(Math.random() * detDB.length)];
        const box = document.getElementById('det-sentence');
        box.innerHTML = "";
        startDetTimer();

        const words = q.t.split(" ");
        words.forEach(word => {
            const span = document.createElement('span');
            span.className = "word-token";
            span.innerText = word;
            span.onclick = () => {
                if(word.includes(q.w)) {
                    clearInterval(detTimerInterval);
                    score += 100;
                    document.getElementById('top-score').innerText = score;
                    showModal("체포 성공!", `거짓: ${q.w}<br>진실: ${q.a}`, () => loadDet(), true);
                } else {
                    detTimeLeft -= 3;
                }
            };
            box.appendChild(span);
        });
    }

</script>
